<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toxic - Fan Poster</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
}

.poster{
    width:660px;
    height:700px;
    background:linear-gradient(to bottom,#000,#222,#444);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,215,0,0.5);
    color:white;
    text-align:center;
}

.poster img{
    width:100%;
    height:340px;
    object-fit:cover;
}

.content{
    padding:20px;
}

h1{
    font-size:42px;
    color:#FFD700;
    letter-spacing:3px;
}

.tagline{
    margin:10px 0;
    color:#ddd;
    font-style:italic;
}

.details{
    margin-top:20px;
    text-align:left;
    line-height:1.8;
}

.details strong{
    color:#FFD700;
}

.button{
    display:inline-block;
    margin-top:25px;
    padding:12px 30px;
    background:#FFD700;
    color:#000;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    color:#bbb;
    font-size:14px;
}
</style>
</head>

<body>

<div class="poster">

    <!-- Replace this with your own image -->
    <img src="C:\Users\divakar j\Desktop\ys.jpg" alt="Toxic Movie Poster">

    <div class="content">

        <h1>TOXIC</h1>

        <p class="tagline">
            "A Fairy Tale for Grown-Ups"
        </p>

        <div class="details">
            <p><strong>Hero:</strong> Yash</p>
            <p><strong>Director:</strong> Geetu Mohandas</p>
            <p><strong>Language:</strong> MultipleLanguage(Pan-India Release)</p>
            <p><strong>Genre:</strong> Action • Crime • Drama</p>
            <p><strong>Date:</strong> August 26,2026</p>
            <p><strong>Age:</strong> Adult-oriented film(18+)</p>

        </div>

        <a href="#" class="button">Watch Trailer</a>

        <div class="footer">
            Fan Poster • HTML & CSS Demo
        </div>

    </div>

</div>

</body>
</html>
